<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Zahlzerlegung</title>
    <style>
        :root {
            --blue: #2196F3;
            --red: #f44336;
            --black: #333333;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .main-card {
            background: var(--card-bg);
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        #dot-container {
            display: grid;
            grid-template-rows: auto auto;
            gap: 20px;
            margin-bottom: 50px;
        }

        .row {
            display: flex;
            gap: 12px;
        }

        .dot:nth-child(5) {
            margin-right: 25px;
        }

        .dot {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
        }

        .dot.blue { background: radial-gradient(circle at 30% 30%, #64b5f6, var(--blue)); }
        .dot.red { 
            background: radial-gradient(circle at 30% 30%, #ff8a80, var(--red));
            transform: rotateY(180deg);
        }

        .math-container {
            position: relative;
            text-align: center;
        }

        .target-number {
            font-size: 140px;
            font-weight: 800;
            color: var(--black);
            line-height: 1;
            margin-bottom: 10px;
        }

        .tree-svg {
            width: 400px;
            height: 120px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        .split-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 550px;
            margin-top: 10px;
        }

        .part-left { 
            color: var(--blue); 
            font-size: 110px; 
            font-weight: 800;
            width: 200px;
            line-height: 1;
        }

        .part-right { 
            color: var(--red); 
            font-size: 110px; 
            font-weight: 800;
            width: 200px;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .placeholder {
            display: inline-block;
            width: 100px;
            border-bottom: 12px solid #ddd;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .footer-hint {
            position: absolute;
            bottom: 30px;
            font-size: 16px;
            color: #aaa;
            background: rgba(0,0,0,0.03);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="dot-container"></div>

        <div class="math-container">
            <div id="target" class="target-number">?</div>
            
            <svg class="tree-svg" viewBox="0 0 400 120">
                <line x1="200" y1="5" x2="110" y2="110" stroke="var(--blue)" stroke-width="6" stroke-linecap="round" />
                <line x1="200" y1="5" x2="290" y2="110" stroke="var(--red)" stroke-width="6" stroke-linecap="round" />
            </svg>

            <div class="split-row">
                <div id="part1" class="part-left">?</div>
                <div id="part2" class="part-right">?</div>
            </div>
        </div>
    </div>

    <div class="footer-hint">
        Tipp: Drücke die <b>Pfeil-nach-Rechts Taste</b> (→) zum Starten und Auflösen.
    </div>

    <script>
        let currentTarget, currentPart1, currentPart2;
        let isSolved = true;

        function generateTask() {
            // Zahlraum bis 20
            currentTarget = Math.floor(Math.random() * 19) + 2; 

            let valid = false;
            while (!valid) {
                // Bedingung: Wenn Ziel > 10, muss Teil 1 mindestens 10 sein
                let minPart1 = (currentTarget > 10) ? 10 : 0;
                
                // Teil 1 zufällig wählen zwischen minPart1 und currentTarget
                currentPart1 = Math.floor(Math.random() * (currentTarget - minPart1 + 1)) + minPart1;
                currentPart2 = currentTarget - currentPart1;

                // Zusätzliche Sicherheit: Kein Zehnerübergang (Einerstelle check)
                let ones1 = currentPart1 % 10;
                let ones2 = currentPart2 % 10;
                let onesTarget = currentTarget % 10;

                if (currentTarget <= 10) {
                    valid = true;
                } else if (currentTarget === 20) {
                    valid = true;
                } else if (ones1 + ones2 === onesTarget) {
                    valid = true;
                }
            }

            renderTask();
        }

        function renderTask() {
            const targetEl = document.getElementById('target');
            targetEl.innerText = currentTarget;
            targetEl.classList.remove('fade-in');
            void targetEl.offsetWidth; 
            targetEl.classList.add('fade-in');

            document.getElementById('part1').innerText = currentPart1;
            document.getElementById('part2').innerHTML = '<span class="placeholder"></span>';
            
            const container = document.getElementById('dot-container');
            container.innerHTML = '';

            const row1 = document.createElement('div');
            row1.className = 'row';
            const row2 = document.createElement('div');
            row2.className = 'row';

            for (let i = 0; i < currentTarget; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot blue';
                if (i < 10) row1.appendChild(dot);
                else row2.appendChild(dot);
            }
            container.appendChild(row1);
            if (currentTarget > 10) container.appendChild(row2);

            isSolved = false;
        }

        function solveTask() {
            document.getElementById('part2').innerText = currentPart2;
            
            const dots = document.querySelectorAll('.dot');
            for (let i = currentPart1; i < currentTarget; i++) {
                dots[i].classList.remove('blue');
                dots[i].classList.add('red');
            }
            isSolved = true;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (isSolved) {
                    generateTask();
                } else {
                    solveTask();
                }
            }
        });

        generateTask();
    </script>
</body>
</html>
